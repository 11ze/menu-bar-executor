name: menu-bar-executor
options:
  bundleIdPrefix: com.cai
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

targets:
  MenuBarExecutor:
    type: application
    platform: macOS
    sources:
      - Sources
      - Sources/App/Views
      - Resources/Assets.xcassets
    resources:
      - Resources/commands.json
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cai.menu-bar-executor
        PRODUCT_NAME: MenuBarExecutor
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: KeyboardShortcuts

  MenuBarExecutorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: MenuBarExecutor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cai.menu-bar-executor.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
