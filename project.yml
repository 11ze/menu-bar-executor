name: menu-bar-exector
options:
  bundleIdPrefix: com.cai
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"

targets:
  menu-bar-exector:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Resources
      - Resources/commands.json
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cai.menu-bar-exector
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
        COMBINE_HIDPI_IMAGES: YES
